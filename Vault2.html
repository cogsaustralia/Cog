<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COG$ Independence Vault</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", system-ui;
  background: radial-gradient(circle at top, #111 0%, #000 60%);
  color: #fff;
}

.container {
  max-width: 460px;
  margin: auto;
  padding: 20px 16px 40px;
}

.hidden { display: none; }

.fade-in {
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  backdrop-filter: blur(6px);
}

.center { text-align: center; }

.logo { width: 64px; margin-bottom: 10px; }
.token { width: 130px; margin: 14px auto; display: block; }

.gold {
  color: #d4af37;
  font-size: 34px;
  font-weight: 600;
}

.label {
  font-size: 11px;
  letter-spacing: 1px;
  opacity: 0.6;
  text-transform: uppercase;
}

.small {
  font-size: 12px;
  opacity: 0.65;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(0,0,0,0.6);
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: linear-gradient(135deg,#d4af37,#f5d76e);
  color: #000;
}

.secondary {
  background: rgba(255,255,255,0.05);
  color: #fff;
}

.danger {
  background: #7a1c1c;
  color: #fff;
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.row button { flex: 1; }

.error {
  color: #ff6b6b;
  font-size: 12px;
  margin-top: 6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
  <div class="center">
    <img src="logo_webcir.png" class="logo">
    <div class="label">COG$ Foundation</div>
    <p class="small">Pre Foundation Launch</p>
  </div>

  <div class="card">
    <form onsubmit="event.preventDefault(); login();">
      <input placeholder="Email or Phone">
      <input id="cogsNumber" placeholder="COG$ Number (NSW1234567)">
      <input type="password" placeholder="Password">

      <div id="loginError" class="error"></div>

      <button id="enterBtn" type="submit" class="primary">
        Enter Independence Vault
      </button>
    </form>

    <button class="secondary" onclick="window.open('https://cogsaustralia.org','_blank')">
      Go to COG$ of Australia Foundation
    </button>

    <p class="small center">Opens official Foundation portal</p>
  </div>
</div>

<!-- APP -->
<div class="container hidden" id="app">

  <div class="center">
    <img src="logo_webcir.png" class="logo">
    <img src="cogs_coin_web.png" class="token">
    <div class="label" id="member"></div>
    <p class="small">Registry • Governance • Coordination</p>
  </div>

  <div class="card center">
    <div class="label">Total Vault Value</div>
    <div class="gold" id="total">0</div>
  </div>

  <div class="card center">
    <div class="label">Community Vault</div>
    <p id="community">0 COG$</p>
  </div>

  <div class="card">
    <div class="label">Adjust Reserve</div>
    <input id="totalInput" placeholder="Enter total (max 1,000,000)">
    <div id="updateError" class="error"></div>
    <button class="primary" onclick="updateTotal()">Confirm</button>
  </div>

  <div class="card">
    <div class="label">State of the Hunt</div>
    <div class="row">
      <button onclick="vote('yes')">YES</button>
      <button onclick="vote('no')">NO</button>
      <button onclick="vote('unsure')">UNSURE</button>
    </div>
    <p id="votes" class="small"></p>
  </div>

  <div class="card">
    <button class="secondary" onclick="openFAQ()">FAQ</button>
    <button class="secondary" onclick="contact()">Contact</button>
  </div>

  <div class="card">
    <button class="danger" onclick="deleteNFT()">Delete NFT COG</button>
  </div>

</div>

<script>
const MAX = 1000000;

// Safe parse helper
function safeNumber(val){
  let n = Number(val);
  return isNaN(n) ? 0 : n;
}

// Correct validation
function valid(id){
  return /^[A-Z]{2}\d{7}$/.test(id);
}

// Load session
window.onload = function(){
  let saved = localStorage.getItem("memberID");
  if(saved){
    enterApp(saved);
  }
};

function login(){
  let idInput = document.getElementById('cogsNumber');
  let id = idInput.value.trim().toUpperCase();

  if(!valid(id)){
    document.getElementById('loginError').innerText =
      "Invalid format (NSW1234567)";
    return;
  }

  localStorage.setItem("memberID", id);
  enterApp(id);
}

function enterApp(id){
  document.getElementById('login').classList.add("hidden");
  document.getElementById('app').classList.remove("hidden");
  document.getElementById('app').classList.add("fade-in");

  document.getElementById('member').innerText = "Member #" + id;

  if(!localStorage.getItem("memberTotal")){
    localStorage.setItem("memberTotal", 10000);
  }

  if(!localStorage.getItem("community")){
    localStorage.setItem("community", 10000);
  }

  render();
}

function render(){
  let total = safeNumber(localStorage.getItem("memberTotal"));
  let community = safeNumber(localStorage.getItem("community"));

  document.getElementById('total').innerText = total.toLocaleString();
  document.getElementById('community').innerText = community.toLocaleString() + " COG$";

  let votes = JSON.parse(localStorage.getItem('votes') || '{"yes":0,"no":0,"unsure":0}');
  document.getElementById('votes').innerText =
    "YES " + votes.yes + " • NO " + votes.no + " • UNSURE " + votes.unsure;
}

function updateTotal(){
  let val = safeNumber(document.getElementById('totalInput').value);

  if(val > MAX){
    document.getElementById('updateError').innerText = "Max exceeded";
    return;
  }

  let old = safeNumber(localStorage.getItem("memberTotal"));
  let diff = val - old;

  localStorage.setItem("memberTotal", val);

  let community = safeNumber(localStorage.getItem("community"));
  localStorage.setItem("community", community + diff);

  document.getElementById('updateError').innerText = "";
  render();
}

function vote(type){
  let votes = JSON.parse(localStorage.getItem('votes') || '{"yes":0,"no":0,"unsure":0}');
  votes[type]++;
  localStorage.setItem('votes', JSON.stringify(votes));
  render();
}

function deleteNFT(){
  if(confirm("Delete vault?")){
    localStorage.clear();
    location.reload();
  }
}

function openFAQ(){
  alert("FAQ coming soon");
}

function contact(){
  alert("Contact coming soon");
}
</script>

</body>
</html>
