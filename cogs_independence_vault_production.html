<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COG$ Independence Vault</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background: linear-gradient(#000,#111); color:#fff;}
  .container { max-width:520px; margin:auto; padding:16px;}
  .card { background:rgba(0,0,0,0.7); border:1px solid rgba(255,215,0,0.2); padding:16px; border-radius:16px; margin-bottom:16px;}
  h1,h2,h3 { margin:6px 0;}
  input { width:100%; padding:10px; margin:6px 0; border-radius:8px; border:none; background:#222; color:#fff;}
  button { padding:10px; border:none; border-radius:8px; cursor:pointer; width:100%;}
  .gold { color:#f5c542; font-size:28px; font-weight:bold;}
  .row { display:flex; gap:8px;}
  .row button { flex:1;}
  .small { font-size:12px; opacity:0.7;}
  .center { text-align:center;}
  img.logo { width:60px; margin-bottom:10px;}
  .error { color:#ff6b6b; font-size:12px; margin-top:4px;}
</style>
</head>
<body>

<div class="container" id="login">
  <div class="center">
    <img src="logocir.png" class="logo">
    <h2>COG$ FOUNDATION</h2>
    <p class="small">Pre Foundation Launch</p>
  </div>
  <div class="card">
    <input placeholder="Email or Phone">
    <input placeholder="COG$ Number (e.g. NSW1234567)" id="cogsNumber">
    <input placeholder="Password" type="password">
    <div id="loginError" class="error"></div>
    <button onclick="login()">Enter Independence Vault</button>
    <p class="small"><a href="https://cogsaustralia.org/reserve" style="color:#ccc;">Reserve Your COG$</a></p>
  </div>
</div>

<div class="container" id="app" style="display:none;">
  <div class="center">
    <img src="logocir.png" class="logo">
    <h2 id="member"></h2>
    <p class="small">Nation Scale Community • Registry • Governance • Coordination</p>
  </div>

  <div class="card">
    <h3>Total Vault Value</h3>
    <div class="gold" id="total"></div>
    <p id="breakdown"></p>
  </div>

  <div class="card">
    <h3>Community Vault</h3>
    <p id="community"></p>
    <button onclick="alert('Community Vault coming next')">Enter Community Vault</button>
  </div>

  <div class="card">
    <h3>State of the Hunt</h3>
    <p class="small">Exploration rights secured in Western Basin.</p>
    <div class="row">
      <button onclick="vote('yes')">YES</button>
      <button onclick="vote('no')">NO</button>
      <button onclick="vote('unsure')">NOT SURE</button>
    </div>
    <p id="votes" class="small"></p>
  </div>

  <div class="card">
    <h3>I wish to update my COG$ Reserve</h3>
    <input id="donation" placeholder="Donation Coins">
    <input id="landholder" placeholder="Landholder Coins">
    <input id="investment" placeholder="Investment Coins">
    <div id="updateError" class="error"></div>
    <button onclick="updateCoins()">Register Adjustment</button>
  </div>

  <div class="card">
    <h3>NFT Control</h3>
    <button onclick="deleteNFT()" style="background:red;color:white;">Delete NFT COG</button>
  </div>
</div>

<script>
const MAX_TOTAL = 1000000;
let coins = { nft:5, donation:2000, landholder:7500, investment:3000 };

function isValidCogsNumber(val){
  return /^[A-Z]{2}\d{7}$/.test(val);
}

function total(){
  return coins.nft + coins.donation + coins.landholder + coins.investment;
}

function login(){
  const input = document.getElementById('cogsNumber').value.trim().toUpperCase();
  const err = document.getElementById('loginError');

  if(!isValidCogsNumber(input)){
    err.innerText = "COG$ Number must be 2 letters + 7 digits (e.g. NSW1234567)";
    return;
  }

  err.innerText = "";
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('member').innerText = "Member #" + input;

  if(!localStorage.getItem('community')) localStorage.setItem('community', total());
  render();
}

function render(){
  document.getElementById('total').innerText = total().toLocaleString();
  document.getElementById('breakdown').innerText =
    "NFT: "+coins.nft+" | Donation: "+coins.donation+" | Landholder: "+coins.landholder+" | Investment: "+coins.investment;

  let community = Number(localStorage.getItem('community')||0);
  document.getElementById('community').innerText = community.toLocaleString()+" Total COG$";

  let votes = JSON.parse(localStorage.getItem('votes')||'{"yes":0,"no":0,"unsure":0}');
  document.getElementById('votes').innerText =
    "YES: "+votes.yes+" | NO: "+votes.no+" | NOT SURE: "+votes.unsure;
}

function updateCoins(){
  let d = Number(document.getElementById('donation').value)||0;
  let l = Number(document.getElementById('landholder').value)||0;
  let i = Number(document.getElementById('investment').value)||0;

  let newTotal = coins.nft + d + l + i;
  if(newTotal > MAX_TOTAL){
    document.getElementById('updateError').innerText = "Max 1,000,000 exceeded";
    return;
  }

  document.getElementById('updateError').innerText = "";

  let diff = newTotal - total();
  coins = { ...coins, donation:d, landholder:l, investment:i };

  let community = Number(localStorage.getItem('community')||0);
  localStorage.setItem('community', community + diff);

  render();
}

function vote(type){
  let votes = JSON.parse(localStorage.getItem('votes')||'{"yes":0,"no":0,"unsure":0}');
  votes[type]++;
  localStorage.setItem('votes', JSON.stringify(votes));
  render();
}

function deleteNFT(){
  if(confirm("Delete NFT and reset vault?")){
    coins = { nft:0, donation:0, landholder:0, investment:0 };
    location.reload();
  }
}
</script>

</body>
</html>
