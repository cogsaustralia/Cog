<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COG$ Independence Vault</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", system-ui;
  background: radial-gradient(circle at top, #111 0%, #000 60%);
  color: #fff;
  overflow-x: hidden;
}

.container {
  max-width: 460px;
  margin: auto;
  padding: 20px 16px 40px;
  transition: all 0.5s ease;
}

.hidden {
  opacity: 0;
  transform: scale(0.98);
  pointer-events: none;
}

.fade-in {
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 20px rgba(212,175,55,0.05);
}

.center { text-align: center; }

.logo { width: 64px; margin-bottom: 10px; }
.token { width: 130px; margin: 14px auto; display: block; }

.gold {
  color: #d4af37;
  font-size: 34px;
  font-weight: 600;
}

.label {
  font-size: 11px;
  letter-spacing: 1px;
  opacity: 0.6;
  text-transform: uppercase;
}

.small {
  font-size: 12px;
  opacity: 0.65;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(0,0,0,0.6);
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-1px);
}

.primary {
  background: linear-gradient(135deg,#d4af37,#f5d76e);
  color: #000;
}

.secondary {
  background: rgba(255,255,255,0.05);
  color: #fff;
}

.danger {
  background: #7a1c1c;
  color: #fff;
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.row button { flex: 1; }

.error {
  color: #ff6b6b;
  font-size: 12px;
  margin-top: 6px;
}

.loading {
  opacity: 0.7;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container fade-in" id="login">
  <div class="center">
    <img src="logo_webcir.png" class="logo">
    <div class="label">COG$ Foundation</div>
    <p class="small">Pre Foundation Launch</p>
  </div>

  <div class="card">
    <form onsubmit="event.preventDefault(); login();">
      <input placeholder="Email or Phone">
      <input id="cogsNumber" placeholder="COG$ Number (NSW1234567)">
      <input type="password" placeholder="Password">

      <div id="loginError" class="error"></div>

      <button id="enterBtn" type="submit" class="primary">
        Enter Independence Vault
      </button>
    </form>

    <button class="secondary" onclick="window.open('https://cogsaustralia.org', '_blank')">
      Go to COG$ of Australia Foundation
    </button>

    <p class="small center">
      Opens official Foundation portal
    </p>
  </div>
</div>

<!-- APP -->
<div class="container hidden" id="app">

  <div class="center">
    <img src="logo_webcir.png" class="logo">
    <img src="cogs_coin_web.png" class="token">
    <div class="label" id="member"></div>
    <p class="small">Registry • Governance • Coordination</p>
  </div>

  <div class="card center">
    <div class="label">Total Vault Value</div>
    <div class="gold" id="total"></div>
    <p class="small">Unified COG$ Reserve</p>
  </div>

  <div class="card center">
    <div class="label">Community Vault</div>
    <p id="community"></p>
    <button class="secondary">Enter Community Vault</button>
  </div>

  <div class="card">
    <div class="label">Adjust Reserve Position</div>
    <input id="totalInput" placeholder="Enter total COG$ (max 1,000,000)">
    <div id="updateError" class="error"></div>
    <button class="primary" onclick="updateTotal()">Confirm Adjustment</button>
  </div>

  <div class="card">
    <div class="label">State of the Hunt</div>
    <p class="small">Exploration rights secured in Western Basin</p>

    <div class="row">
      <button onclick="vote('yes')">YES</button>
      <button onclick="vote('no')">NO</button>
      <button onclick="vote('unsure')">UNSURE</button>
    </div>

    <p id="votes" class="small"></p>
  </div>

  <div class="card">
    <div class="label">Member Support</div>
    <button class="secondary" onclick="openFAQ()">FAQ</button>
    <button class="secondary" onclick="contact()">Contact COGs</button>
  </div>

  <div class="card">
    <div class="label">Vault Control</div>
    <button class="danger" onclick="deleteNFT()">Delete NFT COG</button>
  </div>

</div>

<script>
const MAX = 1000000;
let total = 10000;

function valid(id){
  return /^[A-Z]{2}\\d{7}$/.test(id);
}

function login(){
  let btn = document.getElementById('enterBtn');
  let id = document.getElementById('cogsNumber').value.trim().toUpperCase();

  if(!valid(id)){
    document.getElementById('loginError').innerText = "Use format: NSW1234567";
    return;
  }

  btn.innerText = "Entering Vault...";
  btn.classList.add("loading");

  setTimeout(() => {
    document.getElementById('login').classList.add("hidden");

    setTimeout(() => {
      document.getElementById('login').style.display = "none";
      let app = document.getElementById('app');
      app.style.display = "block";
      app.classList.remove("hidden");
      app.classList.add("fade-in");

      document.getElementById('member').innerText = "Member #" + id;

      if(!localStorage.getItem('community')){
        localStorage.setItem('community', total);
      }

      render();
    }, 400);

  }, 700);
}

function render(){
  document.getElementById('total').innerText = total.toLocaleString();

  let community = Number(localStorage.getItem('community') || 0);
  document.getElementById('community').innerText =
    community.toLocaleString() + " COG$";

  let votes = JSON.parse(localStorage.getItem('votes') || '{"yes":0,"no":0,"unsure":0}');
  document.getElementById('votes').innerText =
    "YES " + votes.yes + " • NO " + votes.no + " • UNSURE " + votes.unsure;
}

function updateTotal(){
  let val = Number(document.getElementById('totalInput').value) || 0;

  if(val > MAX){
    document.getElementById('updateError').innerText = "Maximum exceeded";
    return;
  }

  let diff = val - total;
  total = val;

  let community = Number(localStorage.getItem('community') || 0);
  localStorage.setItem('community', community + diff);

  document.getElementById('updateError').innerText = "";
  render();
}

function vote(type){
  let votes = JSON.parse(localStorage.getItem('votes') || '{"yes":0,"no":0,"unsure":0}');
  votes[type]++;
  localStorage.setItem('votes', JSON.stringify(votes));
  render();
}

function deleteNFT(){
  if(confirm("Delete NFT and reset vault?")){
    total = 0;
    location.reload();
  }
}

function openFAQ(){
  alert("FAQ section will be connected.");
}

function contact(){
  alert("Contact system will be connected.");
}
</script>

</body>
</html>
