name: Deploy to Serversaurus

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: shorty.serversaurus.com.au
          username: cogsaust
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 5m
          script_stop: true
          script: |
            set -e
            cd /home4/cogsaust/public_html
            git fetch origin main
            git reset --hard origin/main
            echo "Deployed commit: $(git log --oneline -1)"
