name: Deploy to Serversaurus

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: shorty.serversaurus.com.au
          username: cogsaust
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home4/cogsaust/public_html
            git fetch origin main
            git reset --hard origin/main
            echo "Deployed at $(date)"
